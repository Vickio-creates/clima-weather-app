<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima App</title>
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/components/layout.css">
  <link rel="stylesheet" href="style/components/logo-card.css">
  <link rel="stylesheet" href="style/components/search.css">
  <link rel="stylesheet" href="style/components/recent-searches.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="scripts/app.js" defer></script>
</head>
<body>
<main>
  <div class="left-panel">

    <!-- Logo Card -->
    <div class="card-logo">
      <div class="logo-box">
        <i data-lucide="cloud"></i>
      </div>
      <h1>Clima</h1>
    </div>

    <!-- Big Search Card -->
    <div class="search-card-city">

      <!-- Small Input Card -->
      <div class="card-city">
        <input type = "text" placeholder = "Enter a city..." />
        <i data-lucide = "search"></i>
      </div>
    </div>

      <!--Recently Search Card-->
      <div class = "recently-search-card">

        <div class = "search-title">
        <span>Recent Searches</span>

        <div class = "see-all">
          <a href="" >See All</a>
        <i data-lucide="chevron-right"></i>
        </div>
        </div>
      

          <!--First Recently Search Card-->
        <div class = "location-items">
          <div class = "location-info">
            <span class = "location-icon">
              <i data-lucide = "cloud-snow"></i>
            </span>

            <div>
              <div class = "location-city">VILNIUS</div>
              <div class = "location-country">Lithuania</div>
            </div>
          </div>

          <div class = "location-temp">-6°C</div>
        </div>

          <!--Second Recently Search Card-->
        <div class = "location-items">
          <div class = "location-info">
            <span class = "location-icon">
              <i data-lucide = "cloud-drizzle"></i>
            </span>

            <div>
              <div class = "location-city">BERLIN</div>
              <div class = "location-country">Germany</div>
            </div>
          </div>

          <div class = "location-temp">-8°C</div>
        </div>

        </div>
  </section>
</main>


</body>
</html>
