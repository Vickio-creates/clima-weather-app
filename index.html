<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima App</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style/main.css" />
  <link rel="stylesheet" href="style/components/card.css" />
  <link rel="stylesheet" href="style/components/layout.css" />
  <link rel="stylesheet" href="style/components/logo.css" />
  <link rel="stylesheet" href="style/components/recent.css" />
  <link rel="stylesheet" href="style/components/search.css" />
  <link rel="stylesheet" href="style/components/middle.css" />

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="scripts/app.js" defer></script>

  <!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <main class="app">

    <div class="app-layout">

      <!-- LEFT PANEL -->
      <aside class="left-panel">

        <!-- Logo -->
        <div class="card-logo">
          <div class="logo-box">
            <i data-lucide="cloud"></i>
          </div>
          <h1>Clima</h1>
        </div>

        <!-- Search -->
        <div class="card-search">
          <div class="input-box">
            <input type="text" id = "city-input" placeholder="Enter a city..." onkeydown = "handleEnter(event)" />
            <i data-lucide="search" onclick = "updateCity()"></i>
          </div>
        </div>

        <!-- Recent -->
        <div class="card-recent">

          <div class="card-header">
            <span>Recent Searches</span>
            <div class="see-all">
              <a href="#">See All</a>
              <i data-lucide="chevron-right"></i>
            </div>
          </div>

          <!-- Item -->
          <div class="location-item">
            <div class="location-info">
              <span class="location-icon">
                <i data-lucide="cloud-snow"></i>
              </span>
              <div>
                <div class="location-city">VILNIUS</div>
                <div class="location-country">Lithuania</div>
              </div>
            </div>
            <div class="location-temp">-6°C</div>
          </div>

          <!-- Item -->
          <div class="location-item">
            <div class="location-info">
              <span class="location-icon">
                <i data-lucide="cloud-drizzle"></i>
              </span>

              <div>
                <div class="location-city">BERLIN</div>
                <div class="location-country">Germany</div>
              </div>
            </div>
            <div class="location-temp">-8°C</div>
          </div>

        </div>

      </aside>

      <!-- MIDDLE -->
      <section class="middle">

        <div class="middle-content">
          <div class="open-location">
          <span class="country">Lithuania</span>
          <h2 class="city" id = "city-name">Vilnius</h2>
          </div>
          <p class="text-description">
            Vilnius is the capital of Lithuania, known for its UNESCO-listed Old Town and rich architecture.
          </p>

          <div class="weather">
            <div class="weather-main">
              <i class="location-icon-big" data-lucide="cloud-snow"></i>
              <div class="temp">-6°C</div>
            </div>

            <div class="extra">
              <div class="humidity">
                <span>H:</span>
                <span>-2°C</span>
              </div>
              <div class="latitude">
                <span>L:</span>
                <span>-8°C</span>
              </div>
            </div>
          </div>
        </div>

      </section>

    </div>

  </main>
</body>

</html>
